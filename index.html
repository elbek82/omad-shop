<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVTO6707</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: system-ui; padding: 16px; background: #f5f5f5; margin: 0; }
        .product { background: white; border-radius: 16px; padding: 12px; margin-bottom: 12px; display: flex; gap: 12px; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .product img { width: 70px; height: 70px; object-fit: contain; border-radius: 12px; background: #f9f9f9; }
        .info { flex: 1; }
        .name { font-weight: 600; margin-bottom: 6px; }
        .price { color: #1a73e8; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="margin-top: 0;">AVTO6707</h1>
    <div id="products">Yuklanmoqda...</div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        async function load() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                const container = document.getElementById('products');
                if (products.length === 0) {
                    container.innerHTML = '<p>Hozircha mahsulot yo‘q</p>';
                } else {
                    container.innerHTML = products.map(p => `
                        <div class="product">
                            <img src="${p.img || 'https://via.placeholder.com/70'}" onerror="this.src='https://via.placeholder.com/70'">
                            <div class="info">
                                <div class="name">${escapeHtml(p.name)}</div>
                                <div class="price">${Number(p.price).toLocaleString()} so'm</div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch(e) {
                document.getElementById('products').innerHTML = '<p>Server bilan bog‘lanib bo‘lmadi</p>';
            }
        }
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        load();
    </script>
</body>
</html>
