<body>

    <header>
        <div class="search-bar">
            <i class="fa fa-search" style="color: #9ea1a7;"></i>
            <input type="text" placeholder="Mahsulotlarni qidirish...">
        </div>
    </header>

    <div class="categories">
        <div class="cat-item">Barchasi</div>
        <div class="cat-item">Elektronika</div>
        <div class="cat-item">Kiyimlar</div>
        <div class="cat-item">Aksessuarlar</div>
    </div>

    <div class="product-grid" id="product-list">
        </div>

    <div class="bottom-nav">
        <div class="nav-item active"><i class="fa fa-home fa-lg"></i><br>Asosiy</div>
        <div class="nav-item"><i class="fa fa-heart fa-lg"></i><br>Saralangan</div>
        <div class="nav-item" onclick="showCart()" style="position: relative;">
            <i class="fa fa-shopping-cart fa-lg"></i><span class="badge" id="cart-count">0</span><br>Savatcha
        </div>
        <div class="nav-item"><i class="fa fa-user fa-lg"></i><br>Profil</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.setText("BUYURTMANI RASMIYLASHTIRISH");
        tg.MainButton.setParams({color: '#7000ff'});

        const products = [
            { id: 1, name: "iPhone 15 Pro Max, 256 GB, Natural Titanium", price: 15400000, oldPrice: 17000000, img: "https://images.unsplash.com/photo-1696446701796-da61225697cc?w=400" },
            { id: 2, name: "AirPods Pro (2nd generation) bilan MagSafe Case", price: 2900000, oldPrice: 3500000, img: "https://images.unsplash.com/photo-1600294037681-c80b4cb5b434?w=400" },
            { id: 3, name: "Apple Watch Series 9, 45mm Aluminum", price: 5600000, oldPrice: 6200000, img: "https://images.unsplash.com/photo-1546868871-70ca48370732?w=400" },
            { id: 4, name: "MacBook Air 13-inch, M2 chip", price: 12800000, oldPrice: 14000000, img: "https://images.unsplash.com/photo-1611186871348-b1ec696e52c9?w=400" }
        ];

        let cart = [];

        function renderProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.img}" class="product-image">
                    <div class="product-info">
                        <div class="product-title">${p.name}</div>
                        <div class="old-price">${p.oldPrice.toLocaleString()} so'm</div>
                        <div class="product-price">${p.price.toLocaleString()} so'm</div>
                    </div>
                    <div class="add-to-cart" onclick="addToCart(${p.id})">
                        <i class="fa fa-plus"></i>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            document.getElementById('cart-count').innerText = cart.length;
            
            if (!tg.MainButton.isVisible) {
                tg.MainButton.show();
            }
            
            // Tugmacha bosilganda tebranish (Haptic Feedback)
            tg.HapticFeedback.impactOccurred('medium');
        }

        // Telegram MainButton bosilganda
        tg.onEvent('mainButtonClicked', function() {
            tg.sendData(JSON.stringify(cart));
        });

        renderProducts();
    </script>
</body>
