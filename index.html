<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVTO6707</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: system-ui; padding: 16px; background: #f5f5f5; }
        .product { background: white; border-radius: 16px; padding: 12px; margin-bottom: 12px; display: flex; gap: 12px; }
        .product img { width: 80px; height: 80px; object-fit: contain; border-radius: 12px; }
        .info { flex: 1; }
        .price { color: #1a73e8; font-weight: bold; }
    </style>
</head>
<body>
    <h1>AVTO6707</h1>
    <div id="products"></div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        async function load() {
            const res = await fetch('/api/products');
            const products = await res.json();
            const container = document.getElementById('products');
            container.innerHTML = products.map(p => `
                <div class="product">
                    <img src="${p.img || 'https://via.placeholder.com/80'}" onerror="this.src='https://via.placeholder.com/80'">
                    <div class="info"><b>${p.name}</b><div class="price">${Number(p.price).toLocaleString()} so'm</div></div>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>
