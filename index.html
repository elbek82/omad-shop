<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AVTO6707 | Premium avto aksessuarlar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body {
            background: #f5f7fc;
            padding-bottom: 85px;
        }
        /* Header */
        .header {
            background: white;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3c72, #0a2b4e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }
        .logo span {
            background: linear-gradient(135deg, #ff4d4d, #c70000);
            -webkit-background-clip: text;
            background-clip: text;
        }
        .search-bar {
            margin-top: 12px;
            background: #f0f2f8;
            border-radius: 30px;
            padding: 12px 18px;
            display: flex;
            gap: 10px;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .search-bar:focus-within {
            background: white;
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
        }
        .search-bar input {
            background: transparent;
            border: none;
            width: 100%;
            outline: none;
            font-size: 16px;
        }
        /* Banner */
        .banner {
            background: linear-gradient(135deg, #0b2b44, #132e4a);
            margin: 16px;
            border-radius: 28px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.2);
        }
        .banner h3 {
            color: white;
            font-size: 22px;
            font-weight: 800;
        }
        .banner p {
            color: rgba(255,255,255,0.8);
            margin-top: 6px;
        }
        .banner i {
            font-size: 64px;
            color: rgba(255,255,255,0.2);
        }
        /* Categories */
        .categories {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 0 16px 20px;
            scrollbar-width: none;
        }
        .cat {
            background: white;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            border: 1px solid #eef2f9;
        }
        .cat.active {
            background: #1a73e8;
            color: white;
            border-color: #1a73e8;
        }
        /* Product grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 0 16px;
        }
        .product-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            position: relative;
        }
        .product-card:active {
            transform: scale(0.97);
        }
        .product-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            padding: 12px;
            background: #fafbfd;
        }
        .product-info {
            padding: 12px 12px 16px;
        }
        .product-title {
            font-weight: 700;
            font-size: 14px;
            line-height: 1.4;
            height: 40px;
            overflow: hidden;
        }
        .product-price {
            font-weight: 800;
            color: #1a73e8;
            margin-top: 8px;
            font-size: 16px;
        }
        .add-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: #1a73e8;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(26,115,232,0.4);
            cursor: pointer;
        }
        /* Bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 25px;
            border-top: 1px solid #eef2f9;
        }
        .nav-item {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: #8f9bb3;
            background: none;
            border: none;
            cursor: pointer;
        }
        .nav-item i {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }
        .nav-item.active {
            color: #1a73e8;
        }
        .cart-badge {
            background: #ff4d4d;
            color: white;
            border-radius: 20px;
            padding: 0px 6px;
            font-size: 10px;
            margin-left: 5px;
        }
        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.open {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: white;
            width: 100%;
            border-radius: 32px 32px 0 0;
            padding: 24px 20px 30px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-img {
            text-align: center;
        }
        .modal-img img {
            width: 180px;
            height: 180px;
            object-fit: contain;
        }
        /* Cart panel */
        .cart-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            border-radius: 32px 32px 0 0;
            transform: translateY(100%);
            transition: 0.3s;
            z-index: 400;
            max-height: 85vh;
            overflow-y: auto;
        }
        .cart-panel.open {
            transform: translateY(0);
        }
        .payment-icons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 16px 0;
        }
        .payment-icons i {
            font-size: 32px;
            color: #2c3e66;
        }
        button {
            background: #1a73e8;
            border: none;
            padding: 14px;
            border-radius: 48px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">AVTO<span>6707</span></div>
    <div class="search-bar">
        <i class="fa fa-search"></i>
        <input type="text" id="searchInput" placeholder="Qidirish...">
    </div>
</div>

<div class="banner">
    <div>
        <h3>🏎️ Sport seriya</h3>
        <p>Karbon aksessuarlar -20%</p>
    </div>
    <i class="fa-solid fa-car-side"></i>
</div>

<div class="categories" id="categories">
    <div class="cat active" data-cat="all">Barchasi</div>
    <div class="cat" data-cat="interior">Salon uchun</div>
    <div class="cat" data-cat="exterior">Tashqi ko'rinish</div>
    <div class="cat" data-cat="electronics">Elektronika</div>
    <div class="cat" data-cat="protection">Himoya</div>
</div>

<div class="product-grid" id="productGrid"></div>

<div class="bottom-nav">
    <button class="nav-item active" data-nav="home"><i class="fa-solid fa-car"></i> Asosiy</button>
    <button class="nav-item" data-nav="cart"><i class="fa-solid fa-basket-shopping"></i> Savatcha <span id="cartCount" class="cart-badge">0</span></button>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <div style="text-align:right"><i class="fa-regular fa-circle-xmark" style="font-size:24px" onclick="closeModal()"></i></div>
        <div class="modal-img"><img id="modalImg" src=""></div>
        <h2 id="modalTitle" style="margin-top:12px"></h2>
        <div id="modalPrice" class="product-price" style="font-size:22px"></div>
        <p id="modalDesc" style="margin:16px 0; color:#555"></p>
        <button onclick="addCurrentToCart()">➕ Savatchaga qo'shish</button>
    </div>
</div>

<div id="cartPanel" class="cart-panel">
    <div style="padding:20px; display:flex; justify-content:space-between; border-bottom:1px solid #eee">
        <span style="font-weight:800">🛒 Savatcha</span>
        <i class="fa-regular fa-circle-xmark" onclick="closeCart()"></i>
    </div>
    <div id="cartItems"></div>
    <div style="padding:20px">
        <div class="payment-icons">
            <i class="fa-brands fa-cc-visa"></i>
            <i class="fa-brands fa-cc-mastercard"></i>
            <i class="fa-solid fa-money-bill-wave"></i>
        </div>
        <div style="display:flex; justify-content:space-between; margin:16px 0">
            <span>Jami:</span>
            <span id="cartTotal">0 so'm</span>
        </div>
        <button id="checkoutBtn">📦 Buyurtma berish</button>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.MainButton.setText("Buyurtma qilish");
    tg.MainButton.hide();

    let products = [];
    let cart = [];
    let currentProduct = null;
    let activeCat = "all";
    let search = "";

    async function fetchProducts() {
        try {
            let res = await fetch('/api/products');
            products = await res.json();
            renderProducts();
        } catch(e) { console.error(e); }
    }

    function renderProducts() {
        let filtered = products.filter(p => activeCat==='all' || p.category===activeCat);
        if(search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));
        const grid = document.getElementById('productGrid');
        if(!filtered.length) { grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px">🔍 Hech narsa topilmadi</div>'; return; }
        grid.innerHTML = filtered.map(p => `
            <div class="product-card" onclick="openModal(${p.id})">
                <img class="product-img" src="${p.img || 'https://via.placeholder.com/300'}" onerror="this.src='https://via.placeholder.com/300'">
                <div class="product-info">
                    <div class="product-title">${escapeHtml(p.name)}</div>
                    <div class="product-price">${Number(p.price).toLocaleString()} so'm</div>
                </div>
                <div class="add-btn" onclick="event.stopPropagation(); addToCart(${p.id})"><i class="fa fa-plus"></i></div>
            </div>
        `).join('');
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    function addToCart(id) {
        let p = products.find(x => x.id === id);
        if(p) { cart.push(p); updateCartUI(); tg.HapticFeedback.impactOccurred('light'); }
    }

    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.length;
        renderCartPanel();
        if(cart.length>0) tg.MainButton.show(); else tg.MainButton.hide();
    }

    function renderCartPanel() {
        let container = document.getElementById('cartItems');
        if(!cart.length) { container.innerHTML = '<div style="padding:20px; text-align:center">Savatcha bo\'sh</div>'; document.getElementById('cartTotal').innerText = "0 so'm"; return; }
        let total = 0;
        let html = '';
        cart.forEach((item, idx) => {
            total += Number(item.price);
            html += `<div style="display:flex; gap:12px; padding:12px 20px; border-bottom:1px solid #eee">
                        <img src="${item.img}" width="50" height="50" style="object-fit:contain; background:#f4f6fc; border-radius:12px">
                        <div style="flex:1"><b>${escapeHtml(item.name)}</b><div>${Number(item.price).toLocaleString()} so'm</div></div>
                        <button onclick="removeFromCart(${idx})" style="background:none; border:none; color:red"><i class="fa-regular fa-trash-can"></i></button>
                    </div>`;
        });
        container.innerHTML = html;
        document.getElementById('cartTotal').innerText = total.toLocaleString() + " so'm";
    }

    function removeFromCart(idx) { cart.splice(idx,1); updateCartUI(); }
    function openModal(id) {
        currentProduct = products.find(p => p.id === id);
        if(currentProduct) {
            document.getElementById('modalImg').src = currentProduct.img || 'https://via.placeholder.com/300';
            document.getElementById('modalTitle').innerText = currentProduct.name;
            document.getElementById('modalPrice').innerHTML = Number(currentProduct.price).toLocaleString() + " so'm";
            document.getElementById('modalDesc').innerHTML = currentProduct.description || "Yuqori sifatli avtomobil aksessuari.";
            document.getElementById('productModal').classList.add('open');
        }
    }
    function closeModal() { document.getElementById('productModal').classList.remove('open'); }
    function addCurrentToCart() { if(currentProduct) { addToCart(currentProduct.id); closeModal(); } }
    function openCart() { document.getElementById('cartPanel').classList.add('open'); renderCartPanel(); }
    function closeCart() { document.getElementById('cartPanel').classList.remove('open'); }

    document.querySelectorAll('.cat').forEach(c => {
        c.addEventListener('click', () => {
            document.querySelectorAll('.cat').forEach(c2 => c2.classList.remove('active'));
            c.classList.add('active');
            activeCat = c.getAttribute('data-cat');
            renderProducts();
        });
    });
    document.getElementById('searchInput').addEventListener('input', (e) => { search = e.target.value; renderProducts(); });
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            if(btn.getAttribute('data-nav') === 'cart') openCart();
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });
    document.getElementById('checkoutBtn').addEventListener('click', () => {
        if(!cart.length) { tg.showPopup({title:"Savatcha bo'sh", message:"Mahsulot qo'shing"}); return; }
        tg.sendData(JSON.stringify({action:"order", items:cart.map(i=>({id:i.id, name:i.name, price:i.price}))}));
        tg.showPopup({title:"Buyurtma qabul qilindi!", message:"Tez orada bog'lanamiz"});
        cart = []; updateCartUI(); closeCart();
    });
    tg.onEvent('mainButtonClicked', () => document.getElementById('checkoutBtn').click());
    fetchProducts();
</script>
</body>
</html>
