<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVTO6707 | Avto aksessuarlar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* (oldingi chiroyli dizayn – qisqartirilgan, asosiy qismi) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f8; padding-bottom: 85px; }
        .glass-header { background: rgba(255,255,255,0.96); backdrop-filter: blur(12px); position: sticky; top:0; padding: 14px 18px; }
        .logo { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #1e3c72, #0a2b4e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .search-wrapper { background: #f4f6fc; border-radius: 32px; padding: 10px 18px; display: flex; gap: 10px; }
        .search-wrapper input { background: transparent; border: none; width: 100%; outline: none; }
        .banner-card { background: linear-gradient(125deg, #0b2b44, #132e4a); border-radius: 28px; padding: 20px; margin: 16px; display: flex; justify-content: space-between; }
        .categories { display: flex; gap: 12px; overflow-x: auto; padding: 8px 16px 20px; }
        .cat-chip { background: white; padding: 8px 22px; border-radius: 40px; font-weight: 600; box-shadow: 0 2px 6px rgba(0,0,0,0.04); white-space: nowrap; }
        .cat-chip.active { background: #1a73e8; color: white; }
        .product-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; padding: 0 16px 20px; }
        .product-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 12px 24px -8px rgba(0,0,0,0.08); position: relative; }
        .img-box { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; padding: 12px; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        .product-details { padding: 12px; }
        .product-title { font-weight: 700; font-size: 14px; height: 38px; overflow: hidden; }
        .price { font-weight: 800; color: #1a73e8; margin-top: 8px; }
        .quick-add { position: absolute; bottom: 12px; right: 12px; background: #1a73e8; color: white; width: 36px; height: 36px; border-radius: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.96); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px 0 28px; border-top: 1px solid #eef2f9; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: #8f9bb3; background: none; border: none; }
        .nav-btn.active { color: #1a73e8; }
        .cart-badge { background: #ff4d4d; color: white; border-radius: 20px; padding: 0px 6px; font-size: 10px; margin-left: 5px; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); z-index:1000; display: flex; align-items: flex-end; visibility: hidden; opacity:0; transition:0.2s; }
        .modal-overlay.open { visibility: visible; opacity:1; }
        .modal-container { background: white; width:100%; max-height:85vh; border-radius: 32px 32px 0 0; overflow-y: auto; padding: 24px 20px 30px; }
        .cart-panel { position: fixed; bottom:0; left:0; width:100%; background: white; border-radius: 28px 28px 0 0; transform: translateY(100%); transition:0.3s; max-height:85vh; z-index:400; }
        .cart-panel.open { transform: translateY(0); }
    </style>
</head>
<body>
<header class="glass-header">
    <div class="logo">AVTO<span>6707</span></div>
    <div class="search-wrapper"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="searchInput" placeholder="Aksessuar qidirish"></div>
</header>
<div class="banner-card"><div><h3>🏎️ Sport seriya</h3><p>Karbon aksessuarlar -20%</p></div><i class="fa-solid fa-car-side fa-3x" style="opacity:0.5"></i></div>
<div class="categories" id="categoriesContainer">
    <div class="cat-chip active" data-cat="all">Barchasi</div>
    <div class="cat-chip" data-cat="interior">Salon uchun</div>
    <div class="cat-chip" data-cat="exterior">Tashqi ko'rinish</div>
    <div class="cat-chip" data-cat="electronics">Elektronika</div>
    <div class="cat-chip" data-cat="protection">Himoya</div>
</div>
<div class="product-grid" id="productGrid"></div>
<div class="bottom-nav">
    <button class="nav-btn active" data-nav="home"><i class="fa-solid fa-car"></i><span>Asosiy</span></button>
    <button class="nav-btn" data-nav="cart"><i class="fa-solid fa-basket-shopping"></i><span>Savatcha <span id="cartCounter" class="cart-badge">0</span></span></button>
</div>

<!-- Modal -->
<div id="detailModal" class="modal-overlay">
    <div class="modal-container">
        <div style="display: flex; justify-content: flex-end;"><i class="fa-regular fa-circle-xmark" style="font-size:26px;" onclick="closeModal()"></i></div>
        <div class="modal-img" style="text-align:center"><img id="modalImg" width="180" src=""></div>
        <h2 id="modalTitle"></h2>
        <div id="modalPrice" class="price" style="font-size:22px;"></div>
        <p id="modalDesc" style="margin:16px 0; color:#4a5a72;"></p>
        <button onclick="addCurrentProductToCart()" style="background:#1a73e8; width:100%; border:none; padding:16px; border-radius:60px; color:white; font-weight:bold;">➕ Savatchaga qo'shish</button>
    </div>
</div>

<!-- Cart panel -->
<div id="cartPanel" class="cart-panel">
    <div style="position:sticky; top:0; background:white; padding:20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;"><span style="font-weight:800">🛒 Savatcha</span><i class="fa-solid fa-xmark" onclick="toggleCartPanel()"></i></div>
    <div id="cartItemsList"></div>
    <div style="padding:20px; border-top:1px solid #eef2fa;">
        <div class="payment-icons" style="display:flex; gap:12px; justify-content:center;"><i class="fa-brands fa-cc-visa"></i><i class="fa-brands fa-cc-mastercard"></i><i class="fa-solid fa-money-bill-wave"></i> Click / Payme</div>
        <div style="display:flex; justify-content:space-between; margin:14px 0;"><span>Jami:</span><span id="cartTotalAmount">0 so'm</span></div>
        <button id="checkoutBtn" style="background:#1a73e8; width:100%; border:none; padding:15px; border-radius:48px; color:white;">📦 Buyurtma berish</button>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    let allProducts = [], cart = [], currentProduct = null;
    let activeCategory = "all", searchTerm = "";
    const productGrid = document.getElementById("productGrid");
    const searchInput = document.getElementById("searchInput");

    async function fetchProducts() {
        try {
            const res = await fetch('/api/products');
            allProducts = await res.json();
            renderProducts();
        } catch(e) { console.error(e); }
    }
    function renderProducts() {
        let filtered = allProducts.filter(p => activeCategory==='all' || p.category===activeCategory);
        if(searchTerm) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));
        if(!filtered.length) { productGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">🔍 Hech narsa topilmadi</div>'; return; }
        productGrid.innerHTML = filtered.map(p => `
            <div class="product-card" onclick="openProductModal(${p.id})">
                <div class="img-box"><img src="${p.img || 'https://via.placeholder.com/300'}" onerror="this.src='https://via.placeholder.com/300'"></div>
                <div class="product-details"><div class="product-title">${escapeHtml(p.name)}</div><div class="price">${Number(p.price).toLocaleString()} so'm</div></div>
                <div class="quick-add" onclick="event.stopPropagation(); addToCartById(${p.id})"><i class="fa fa-plus"></i></div>
            </div>
        `).join('');
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function addToCartById(id) {
        const p = allProducts.find(x => x.id === id);
        if(p) { cart.push(p); updateCartUI(); tg.HapticFeedback.impactOccurred('light'); }
    }
    function updateCartUI() {
        document.getElementById('cartCounter').innerText = cart.length;
        renderCartPanel();
        if(cart.length>0) tg.MainButton.show(); else tg.MainButton.hide();
    }
    function renderCartPanel() {
        const container = document.getElementById('cartItemsList');
        if(!cart.length) { container.innerHTML = '<div style="padding:20px; text-align:center;">Savatcha bo‘sh</div>'; document.getElementById('cartTotalAmount').innerText = '0 so\'m'; return; }
        let total = 0, html = '';
        cart.forEach((item, idx) => {
            total += Number(item.price);
            html += `<div style="display:flex; gap:12px; padding:12px 20px; border-bottom:1px solid #eee;">
                        <img src="${item.img}" width="50" height="50" style="object-fit:contain; background:#f4f6fc; border-radius:12px;">
                        <div style="flex:1"><b>${escapeHtml(item.name)}</b><div>${Number(item.price).toLocaleString()} so'm</div></div>
                        <button onclick="removeFromCart(${idx})" style="background:none; border:none; color:red;"><i class="fa-regular fa-trash-can"></i></button>
                    </div>`;
        });
        container.innerHTML = html;
        document.getElementById('cartTotalAmount').innerText = total.toLocaleString() + " so'm";
    }
    window.removeFromCart = (idx) => { cart.splice(idx,1); updateCartUI(); };
    function openProductModal(id) {
        currentProduct = allProducts.find(p => p.id === id);
        if(currentProduct){
            document.getElementById('modalImg').src = currentProduct.img || 'https://via.placeholder.com/300';
            document.getElementById('modalTitle').innerText = currentProduct.name;
            document.getElementById('modalPrice').innerHTML = Number(currentProduct.price).toLocaleString() + " so'm";
            document.getElementById('modalDesc').innerHTML = currentProduct.description || "Sifatli avtomobil aksessuari. Tez yetkazib berish.";
            document.getElementById('detailModal').classList.add('open');
        }
    }
    function closeModal() { document.getElementById('detailModal').classList.remove('open'); }
    function addCurrentProductToCart() { if(currentProduct) { addToCartById(currentProduct.id); closeModal(); } }
    function toggleCartPanel() { document.getElementById('cartPanel').classList.toggle('open'); renderCartPanel(); }
    document.querySelectorAll(".cat-chip").forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll(".cat-chip").forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            activeCategory = chip.getAttribute('data-cat');
            renderProducts();
        });
    });
    searchInput.addEventListener('input', (e) => { searchTerm = e.target.value; renderProducts(); });
    document.getElementById('checkoutBtn').addEventListener('click', () => {
        if(!cart.length) { tg.showPopup({title:"Savatcha bo'sh", message:"Mahsulot qo'shing"}); return; }
        tg.sendData(JSON.stringify({action:"order", items:cart.map(i=>({id:i.id, name:i.name, price:i.price}))}));
        tg.showPopup({title:"Buyurtma qabul qilindi!", message:"Tez orada bog'lanamiz"});
        cart = []; updateCartUI(); toggleCartPanel();
    });
    tg.onEvent('mainButtonClicked', () => { document.getElementById('checkoutBtn').click(); });
    fetchProducts();
</script>
</body>
</html>
